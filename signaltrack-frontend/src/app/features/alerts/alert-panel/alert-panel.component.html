@if (hasAlerts()) {
  <aside class="alert-panel" [class.collapsed]="!ui.alertPanelOpen()">
    @if (!ui.alertPanelOpen()) {
      <button class="collapsed-header" (click)="togglePanel()" title="Deschide alerte">
        <span class="alert-icon">⚠</span>
        <span class="count-badge">{{ alerts().length }}</span>
      </button>
    } @else {
      <div class="panel-header">
        <div class="header-left">
          <span class="alert-icon">⚠</span>
          <h3 class="title">Alerte</h3>
          <span class="count-badge">{{ alerts().length }}</span>
        </div>
        <button class="toggle-btn" (click)="togglePanel()" title="Închide alerte">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <path
              d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"
            />
          </svg>
        </button>
      </div>

      <div class="alert-list">
        @for (vehicle of alerts(); track vehicle.id) {
          <div class="alert-card" (click)="onAlertClick(vehicle.id)">
            <div class="alert-card-header">
              <span class="plate">{{ vehicle.plateNumber }}</span>
              <app-status-badge [status]="vehicle.status" />
            </div>
            <div class="driver">{{ vehicle.driverName }}</div>
            <div class="alert-details">
              <span class="detail">
                <span class="detail-icon">🏎</span>
                {{ vehicle.speed }} km/h
              </span>
              <span class="detail">
                <span class="detail-icon">⛽</span>
                {{ vehicle.fuelLevel }}%
              </span>
            </div>
            <div class="alert-time">{{ vehicle.lastUpdate | timeAgo }}</div>
          </div>
        }
      </div>
    }
  </aside>
}

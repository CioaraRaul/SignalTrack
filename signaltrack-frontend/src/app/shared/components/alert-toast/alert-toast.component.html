<div class="toast-container">
  @for (n of notifications(); track n.id) {
    <div class="toast" (click)="dismiss(n.id)">
      <div class="toast-icon">⚠</div>
      <div class="toast-body">
        <div class="toast-title">Alertă nouă!</div>
        <div class="toast-message">
          <strong>{{ n.vehicle.plateNumber }}</strong> — {{ n.vehicle.driverName }}
        </div>
        <div class="toast-detail">Viteză: {{ n.vehicle.speed }} km/h</div>
      </div>
      <button class="toast-close" (click)="dismiss(n.id)">✕</button>
    </div>
  }
</div>
